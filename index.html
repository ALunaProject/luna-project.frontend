<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Luna | Faça seu login agora!</title>
    <link rel="stylesheet" href="src/pages/about-luna/about-luna.css" />
    <link rel="stylesheet" href="src/pages/login/styles/styles.css" />
    <link
      rel="shortcut icon"
      href="src/assets/images/luna-logo.png"
      type="image/x-icon"
    />
  </head>
  <body>
    <div class="logo">
      <img src="src/assets/images/luna-logo-xl.png" alt="luna-logo" />
      <p>Luna</p>
    </div>
    <section>
      <h1>Faça seu Login</h1>
      <form action="src/pages/about-luna/about-luna.html" method="get">
        <fieldset class="input-wrapper">
          <fieldset>
            <label for="email">Email</label>
            <div class="input">
              <img src="src/assets/icons/mail.svg" alt="-icon" />
              <input placeholder="Digite seu email" type="email" id="email" />
            </div>
          </fieldset>

          <fieldset>
            <label style="width: 100%" for="password"
              >Senha
              <span
                ><img
                  src="src/assets/icons/eye.svg"
                  alt="password-eye-icon"
                />
                Mostrar</span
              ></label
            >
            <div class="input">
              <img src="src/assets/icons/lock.svg" alt="-icon" />
              <input
                placeholder="Digite sua senha"
                type="password"
                id="password"
              />
            </div>
          </fieldset>
        </fieldset>
        <button type="submit">Enviar</button>
        <p>
          Não tem uma conta? <a href="src/pages/login/sign-in.html">Crie sua conta agora!</a>
        </p>
      </form>
    </section>
    <script src="src/helpers/login.js"></script>
    <div class="neon-container">
        <a class="dev-mode neon-text" href="src/pages/about-luna/about-luna.html">Back-end ainda em construção,
        clique aqui para ver a prévia</a>
    </div>
    <!-- Ancora teste pra navegar entre as páginas sem o backend -->
  </body>
</html>
