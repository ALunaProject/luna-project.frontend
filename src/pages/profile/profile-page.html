<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="../../assets/images/luna-logo.png"
      type="image/x-icon"
    />
    <title>Luna | Seu Perfil</title>
    <link rel="stylesheet" href="../profile/styles/profile-page.css" />
    <link rel="stylesheet" href="../../components/SideBar/styles.css" />
  </head>
  <body>
    <aside class="left-sidebar">
      <div class="menu-top">
        <img src="../../assets/images/luna-logo.png" alt="luna-logo" />
        <h6>Luna</h6>
      </div>
      <div class="menu-list">
        <a href="#" class="link">
          <img src="../../assets/icons/folder-icon.svg" alt="folder-icon" />
          <p>NewsPage</p>
        </a>
        <a href="#" class="link">
          <img src="../../assets/icons/book-square.svg" alt="library-icon" />
          <p>FindGame</p>
        </a>
        <a href="#" class="link">
          <img src="../../assets/icons/people.svg" alt="group-icon" />
          <p>FindPeople</p>
        </a>
      </div>
      <div class="menu-bottom">
        <div class="more-links">
          <a href="#" class="link">
            <img
              src="../../assets/icons/message-question.svg"
              alt="question-box-icon"
            />
            <p>About Luna</p>
          </a>
        </div>

        <div class="profile">
          <div class="avatar">
            <img src="../../assets/images/avatar-icon.png" alt="user-icon" />
            <p class="avatar-name">@chimbinha</p>
          </div>
          <a href="">
            <img src="../../assets/icons/menu.svg" alt="three-dots-icon" />
          </a>
        </div>
      </div>
    </aside>

    <main class="main-profile">
      <img src="../../assets/images/profileHeader.png" alt="Profile header" />
      <div class="fosae">
        <img src="../../assets/images/profile-icon.png" alt="Profile icon" />

      </div>
      <h3>@estelionathalia</h3>
      <p>Essa é minha bio, eu gosto de batata e jogos</p>
      <div class="my-tags">
        <div class="tag">
          <p>FPS</p>
        </div>
        <div class="tag">
          <p>Indie</p>
        </div>
        <div class="tag">
          <p>COOP</p>
        </div>
        <div class="tag">
          <p>Building</p>
        </div>
        <div class="tag">
          <p>Single-player</p>
        </div>
      </div>
      <section class="favoritos">
        <h2>Favoritos</h2>
        <div class="lista-favoritos">
          <div class="card-jogo">
            <img
              src="../../assets/images/lol-poster.png"
              alt="Capa do jogo League of Legends"
            />
            <p class="titulo-jogo">League of Legends</p>
          </div>

          <div class="card-jogo">
            <img
              src="../../assets/images/lol-poster.png"
              alt="Capa do jogo League of Legends"
            />
            <p class="titulo-jogo">League of Legends</p>
          </div>

          <div class="card-jogo">
            <img
              src="../../assets/images/lol-poster.png"
              alt="Capa do jogo League of Legends"
            />
            <p class="titulo-jogo">League of Legends</p>
          </div>

          <div class="card-jogo">
            <img
              src="../../assets/images/lol-poster.png"
              alt="Capa do jogo League of Legends"
            />
            <p class="titulo-jogo">League of Legends</p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
