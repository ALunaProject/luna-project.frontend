<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Luna | Faça seu login agora!</title>
    <link rel="stylesheet" href="../about-luna/about-luna.css" />
    <link rel="stylesheet" href="./styles/styles.css" />
    <link rel="stylesheet" href="./styles/input-animation.css" />
  </head>
  <body>
    <div class="logo">
      <img src="../../assets/images/luna-logo-xl.png" alt="luna-logo" />
      <p>Luna</p>
    </div>
    <section>
      <h1>Faça seu Login</h1>
      <form action="../about-luna/about-luna.html" method="get">
        <fieldset class="brutalist-container">
          <input
            placeholder="DIGITE SEU EMAIL"
            class="brutalist-input smooth-type"
            type="email"
            id="email"
          />
          <label class="brutalist-label">SEU EMAIL</label>
        </fieldset>

        <fieldset class="brutalist-container">
          <input
            placeholder="DIGITE SUA SENHA"
            class="brutalist-input smooth-type"
            type="password"
            id="password"
          />
          <label class="brutalist-label">SUA SENHA</label>
        </fieldset>
        <p>Não tem uma conta? <a href="./sign-in.html">Crie sua conta agora!</a></p>
        <button type="submit">Enviar</button>
      </form>
    </section>
    <!-- <script src="login.js"></script> -->
  </body>
</html>
