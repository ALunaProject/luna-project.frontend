<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Luna | Faça seu login agora!</title>
    <link rel="stylesheet" href="../about-luna/about-luna.css" />
    <link rel="stylesheet" href="./styles/styles.css" />
    <link
      rel="shortcut icon"
      href="../../assets/images/luna-logo.png"
      type="image/x-icon"
    />
  </head>
  <body>
    <div class="logo">
      <img src="../../assets/images/luna-logo-xl.png" alt="luna-logo" />
      <p>Luna</p>
    </div>
    <section>
      <h1>Faça seu Login</h1>
      <form action="../about-luna/about-luna.html" method="get">
        <fieldset class="input-wrapper">
          <fieldset>
            <label for="email">Email</label>
            <div class="input">
              <img src="../../assets/icons/mail.svg" alt="-icon" />
              <input placeholder="Digite seu email" type="email" id="email" />
            </div>
          </fieldset>

          <fieldset>
            <label style="width: 100%" for="password"
              >Senha
              <span
                ><img
                  src="../../assets/icons/eye.svg"
                  alt="password-eye-icon"
                />
                Mostrar</span
              ></label
            >
            <div class="input">
              <img src="../../assets/icons/lock.svg" alt="-icon" />
              <input
                placeholder="Digite sua senha"
                type="password"
                id="password"
              />
            </div>
          </fieldset>
        </fieldset>
        <button type="submit">Enviar</button>
        <p>
          Não tem uma conta? <a href="./sign-in.html">Crie sua conta agora!</a>
        </p>
      </form>
    </section>
    <!-- <script src="login.js"></script> -->
  </body>
</html>
