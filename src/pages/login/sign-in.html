<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Luna | Crie sua conta agora!</title>
    <link rel="stylesheet" href="../about-luna/about-luna.css" />
    <link rel="stylesheet" href="./styles/styles.css" />
    <link rel="stylesheet" href="./styles/input-animation.css" />
    <link
      rel="shortcut icon"
      href="../../assets/images/luna-logo.png"
      type="image/x-icon"
    />
  </head>
  <body>
    <div class="logo">
      <img src="../../assets/images/luna-logo-xl.png" alt="luna-logo" />
      <p>Luna</p>
    </div>
    <section>
      <h1>Crie sua conta agora!</h1>
      <form action="../../../login.html" method="get">
        <fieldset class="input-wrapper">
          <fieldset>
            <label for="name">Nome</label>
            <div class="input">
              <img
                src="../../assets/icons/profile-circle.svg"
                alt="user-icon"
              />
              <input placeholder="Digite seu nome" type="name" id="name" />
            </div>
          </fieldset>

          <fieldset>
            <label for="email">Email</label>
            <div class="input">
              <img src="../../assets/icons/mail.svg" alt="main-icon" />
              <input placeholder="Digite seu email" type="email" id="email" />
            </div>
          </fieldset>

          <fieldset>
            <label style="width: 100%" for="password"
              >Senha
              <span
                ><img
                  src="../../assets/icons/eye.svg"
                  alt="password-eye-icon"
                />
                Mostrar</span
              ></label
            >
            <div class="input">
              <img src="../../assets/icons/lock.svg" alt="lock-icon" />
              <input
                placeholder="Digite sua senha"
                type="password"
                id="password"
              />
            </div>
          </fieldset>
        </fieldset>
        <button type="submit">Enviar</button>
        <p>Já tem uma conta? <a href="../../../login.html">Faça login por aqui!</a></p>
      </form>
    </section>
    <script src="../../helpers/reg.js"></script>

    <div class="neon-container">
        <a class="dev-mode neon-text" href="../about-luna/about-luna.html">Back-end ainda em construção,
            clique aqui para ver a prévia</a>
    </div>
    <!-- Ancora teste pra navegar entre as páginas sem o backend -->
  </body>
</html>
