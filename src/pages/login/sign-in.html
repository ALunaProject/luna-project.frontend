<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Luna | Crie sua conta agora!</title>
    <link rel="stylesheet" href="../about-luna/about-luna.css" />
    <link rel="stylesheet" href="./styles/styles.css" />
    <link rel="stylesheet" href="./styles/input-animation.css" />
  </head>
  <body>
    <div class="logo">
      <img src="../../assets/images/luna-logo-xl.png" alt="luna-logo" />
      <p>Luna</p>
    </div>
    <section>
      <h1>Crie sua conta agora!</h1>
      <form action="../about-luna/about-luna.html" method="get">
        <fieldset class="brutalist-container">
          <input
            placeholder="DIGITE SEU NOME"
            class="brutalist-input smooth-type"
            type="name"
            id="name"
          />
          <label class="brutalist-label">COMO SE CHAMA? 🤔</label>
        </fieldset>
        <fieldset class="brutalist-container">
          <input
            placeholder="DIGITE SEU EMAIL"
            class="brutalist-input smooth-type"
            type="email"
            id="email"
          />
          <label class="brutalist-label">SEU EMAIL ✉️</label>
        </fieldset>
        <fieldset class="brutalist-container">
          <input
            placeholder="DIGITE SUA SENHA"
            class="brutalist-input smooth-type"
            type="password"
            id="password"
          />
          <label class="brutalist-label">SUA SENHA 🤫</label>
        </fieldset>
        <p>Já tem uma conta? <a href="./login.html">Faça login aqui</a></p>
        <button type="submit">Enviar</button>
      </form>
    </section>
    <!-- <script src="login.js"></script> -->
  </body>
</html>
